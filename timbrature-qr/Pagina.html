<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Timbratura</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .header {
      text-align: center;
      padding: 20px 0 10px;
    }

    .header h1 {
      font-size: 22px;
      color: #333;
      margin-bottom: 4px;
    }

    .header .nome {
      font-size: 28px;
      font-weight: 700;
      color: #1a73e8;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .pin-section label {
      display: block;
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .pin-input {
      width: 100%;
      font-size: 32px;
      text-align: center;
      letter-spacing: 12px;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      outline: none;
      transition: border-color 0.2s;
      -webkit-text-security: disc;
    }

    .pin-input:focus {
      border-color: #1a73e8;
    }

    .pin-input.error {
      border-color: #d93025;
      animation: shake 0.4s ease-in-out;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    .btn-timbra {
      width: 100%;
      padding: 18px;
      font-size: 22px;
      font-weight: 700;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s;
      color: white;
      letter-spacing: 1px;
      position: relative;
      overflow: hidden;
    }

    .btn-timbra:active {
      transform: scale(0.97);
    }

    .btn-timbra:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-entrata {
      background: linear-gradient(135deg, #34a853, #1e8e3e);
    }

    .btn-uscita {
      background: linear-gradient(135deg, #ea4335, #c5221f);
    }

    .btn-loading {
      background: #9e9e9e;
    }

    .status-box {
      text-align: center;
      padding: 16px;
      border-radius: 12px;
      font-size: 15px;
      line-height: 1.5;
    }

    .status-success {
      background: #e6f4ea;
      color: #1e8e3e;
    }

    .status-error {
      background: #fce8e6;
      color: #d93025;
    }

    .status-info {
      background: #e8f0fe;
      color: #1a73e8;
    }

    .status-box .big {
      font-size: 42px;
      display: block;
      margin-bottom: 8px;
    }

    .status-box .ora {
      font-size: 24px;
      font-weight: 700;
      display: block;
    }

    .gps-status {
      font-size: 13px;
      color: #999;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .gps-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    .gps-dot.ok { background: #34a853; }
    .gps-dot.loading { background: #fbbc04; animation: pulse 1s infinite; }
    .gps-dot.error { background: #ea4335; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .footer {
      text-align: center;
      font-size: 11px;
      color: #ccc;
      padding: 20px 0;
    }

    .bar-name {
      font-size: 13px;
      color: #999;
      text-align: center;
      font-weight: 500;
    }

    /* Overlay di caricamento iniziale */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.3s;
    }

    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e0e0e0;
      border-top-color: #1a73e8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <!-- Overlay caricamento -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <p style="color:#666;">Caricamento...</p>
  </div>

  <div class="container">
    <div class="header">
      <div class="bar-name">La Tienda de Juan</div>
      <h1>Timbratura</h1>
      <div class="nome" id="nomeDisplay"><?= employeeName ?></div>
    </div>

    <!-- Stato GPS -->
    <div class="gps-status" id="gpsStatus">
      <span class="gps-dot loading" id="gpsDot"></span>
      <span id="gpsText">Localizzazione in corso...</span>
    </div>

    <!-- PIN -->
    <div class="card pin-section" id="pinSection">
      <label for="pinInput">Inserisci il tuo PIN</label>
      <input type="tel"
             id="pinInput"
             class="pin-input"
             maxlength="4"
             pattern="[0-9]*"
             inputmode="numeric"
             autocomplete="off"
             placeholder="••••">
    </div>

    <!-- Bottone Timbra -->
    <button class="btn-timbra btn-loading" id="btnTimbra" disabled onclick="timbra()">
      Caricamento...
    </button>

    <!-- Risultato -->
    <div class="status-box status-info" id="statusBox" style="display:none;"></div>

    <div class="footer">
      La Tienda de Juan &mdash; Rilevazione presenze
    </div>
  </div>

  <script>
    // Dati iniettati dal server
    var EMPLOYEE_ID = '<?= employeeId ?>';
    var BAR_LAT = <?= barLat ?>;
    var BAR_LNG = <?= barLng ?>;
    var MAX_DISTANZA = <?= maxDistanza ?>;

    // Stato
    var gpsReady = false;
    var currentLat = null;
    var currentLng = null;
    var prossimaAzione = null;
    var isProcessing = false;

    // ---- Inizializzazione ----
    init();

    function init() {
      // Avvia geolocalizzazione
      if ('geolocation' in navigator) {
        navigator.geolocation.getCurrentPosition(
          onGpsSuccess,
          onGpsError,
          { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
        );
      } else {
        showGpsStatus('error', 'GPS non disponibile su questo dispositivo');
      }

      // Carica prossima azione
      google.script.run
        .withSuccessHandler(onAzioneLoaded)
        .withFailureHandler(function(err) {
          onAzioneLoaded('ENTRATA');
        })
        .getProssimaAzione(EMPLOYEE_ID);

      // Focus sul PIN quando la pagina è caricata
      setTimeout(function() {
        document.getElementById('pinInput').focus();
      }, 500);

      // Timbra con Enter dopo aver inserito il PIN
      document.getElementById('pinInput').addEventListener('keyup', function(e) {
        if (e.key === 'Enter' && this.value.length === 4) {
          timbra();
        }
      });
    }

    // ---- GPS ----
    function onGpsSuccess(position) {
      currentLat = position.coords.latitude;
      currentLng = position.coords.longitude;
      gpsReady = true;

      var distanza = calcolaDistanza(BAR_LAT, BAR_LNG, currentLat, currentLng);

      if (distanza <= MAX_DISTANZA) {
        showGpsStatus('ok', 'Posizione verificata (' + Math.round(distanza) + 'm dal bar)');
      } else {
        showGpsStatus('error', 'Troppo lontano dal bar (' + Math.round(distanza) + 'm)');
      }

      checkReady();
    }

    function onGpsError(error) {
      var msg = 'Errore GPS: ';
      switch(error.code) {
        case 1: msg += 'Permesso negato. Abilita la localizzazione.'; break;
        case 2: msg += 'Posizione non disponibile.'; break;
        case 3: msg += 'Timeout. Riprova.'; break;
        default: msg += error.message;
      }
      showGpsStatus('error', msg);

      // Mostra un messaggio di aiuto
      var statusBox = document.getElementById('statusBox');
      statusBox.className = 'status-box status-error';
      statusBox.innerHTML = '<span class="big">📍</span>' +
        'Devi abilitare la localizzazione per timbrare.<br><br>' +
        '<b>iPhone:</b> Impostazioni → Privacy → Servizi di localizzazione<br>' +
        '<b>Android:</b> Impostazioni → Posizione → Attiva';
      statusBox.style.display = 'block';
    }

    function showGpsStatus(status, text) {
      document.getElementById('gpsDot').className = 'gps-dot ' + status;
      document.getElementById('gpsText').textContent = text;
    }

    // ---- Azione (ENTRATA/USCITA) ----
    function onAzioneLoaded(azione) {
      prossimaAzione = azione;
      checkReady();
    }

    function checkReady() {
      if (prossimaAzione) {
        var btn = document.getElementById('btnTimbra');
        btn.textContent = 'TIMBRA ' + prossimaAzione;
        btn.className = 'btn-timbra ' + (prossimaAzione === 'ENTRATA' ? 'btn-entrata' : 'btn-uscita');
        btn.disabled = false;

        // Nascondi overlay
        document.getElementById('loadingOverlay').classList.add('hidden');
      }
    }

    // ---- Timbratura ----
    function timbra() {
      if (isProcessing) return;

      var pin = document.getElementById('pinInput').value;

      // Valida PIN
      if (pin.length !== 4) {
        document.getElementById('pinInput').classList.add('error');
        setTimeout(function() {
          document.getElementById('pinInput').classList.remove('error');
        }, 400);
        return;
      }

      // Controlla GPS
      if (!gpsReady) {
        showStatusBox('error', '<span class="big">📍</span>In attesa della posizione GPS...<br>Assicurati di aver abilitato la localizzazione.');
        return;
      }

      // Avvia
      isProcessing = true;
      var btn = document.getElementById('btnTimbra');
      btn.disabled = true;
      btn.textContent = 'Registrazione...';
      btn.className = 'btn-timbra btn-loading';

      var data = {
        employeeId: EMPLOYEE_ID,
        pin: pin,
        lat: currentLat,
        lng: currentLng,
        userAgent: navigator.userAgent.substring(0, 150)
      };

      google.script.run
        .withSuccessHandler(onTimbraturaSuccess)
        .withFailureHandler(onTimbraturaError)
        .registraTimbratura(data);
    }

    function onTimbraturaSuccess(result) {
      isProcessing = false;

      if (result.success) {
        var icon = result.tipo === 'ENTRATA' ? '✅' : '🔴';
        showStatusBox('success',
          '<span class="big">' + icon + '</span>' +
          '<b>' + result.tipo + ' registrata</b><br>' +
          '<span class="ora">' + result.ora + '</span><br>' +
          'Distanza: ' + result.distanza + 'm dal bar'
        );

        // Aggiorna bottone per la prossima azione
        prossimaAzione = result.tipo === 'ENTRATA' ? 'USCITA' : 'ENTRATA';
        var btn = document.getElementById('btnTimbra');
        btn.textContent = 'TIMBRA ' + prossimaAzione;
        btn.className = 'btn-timbra ' + (prossimaAzione === 'ENTRATA' ? 'btn-entrata' : 'btn-uscita');
        btn.disabled = false;

        // Pulisci PIN
        document.getElementById('pinInput').value = '';

      } else {
        showStatusBox('error', '<span class="big">⚠️</span>' + result.errore);

        // Se PIN errato, evidenzia il campo
        if (result.errore.indexOf('PIN') !== -1) {
          document.getElementById('pinInput').classList.add('error');
          document.getElementById('pinInput').value = '';
          document.getElementById('pinInput').focus();
          setTimeout(function() {
            document.getElementById('pinInput').classList.remove('error');
          }, 400);
        }

        // Riabilita bottone
        var btn = document.getElementById('btnTimbra');
        btn.textContent = 'TIMBRA ' + prossimaAzione;
        btn.className = 'btn-timbra ' + (prossimaAzione === 'ENTRATA' ? 'btn-entrata' : 'btn-uscita');
        btn.disabled = false;
      }
    }

    function onTimbraturaError(error) {
      isProcessing = false;
      showStatusBox('error', '<span class="big">❌</span>Errore di comunicazione.<br>Riprova tra qualche secondo.');

      var btn = document.getElementById('btnTimbra');
      btn.textContent = 'TIMBRA ' + prossimaAzione;
      btn.className = 'btn-timbra ' + (prossimaAzione === 'ENTRATA' ? 'btn-entrata' : 'btn-uscita');
      btn.disabled = false;
    }

    // ---- Utilità ----
    function showStatusBox(type, html) {
      var box = document.getElementById('statusBox');
      box.className = 'status-box status-' + type;
      box.innerHTML = html;
      box.style.display = 'block';
    }

    function calcolaDistanza(lat1, lon1, lat2, lon2) {
      var R = 6371000;
      var dLat = (lat2 - lat1) * Math.PI / 180;
      var dLon = (lon2 - lon1) * Math.PI / 180;
      var a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLon/2) * Math.sin(dLon/2);
      var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }
  </script>

</body>
</html>
