<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Timbratura - La Tienda de Juan</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .header {
      text-align: center;
      padding: 24px 0 8px;
    }

    .bar-name {
      font-size: 13px;
      color: #999;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .header h1 {
      font-size: 24px;
      color: #333;
    }

    /* ---- STEP 1: Selezione dipendente ---- */
    .employee-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .employee-list p {
      text-align: center;
      color: #666;
      font-size: 15px;
    }

    .btn-employee {
      width: 100%;
      padding: 20px;
      font-size: 20px;
      font-weight: 600;
      border: 2px solid #e0e0e0;
      border-radius: 14px;
      background: white;
      color: #333;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-employee:active {
      transform: scale(0.97);
      border-color: #1a73e8;
      background: #e8f0fe;
    }

    /* ---- STEP 2: PIN + Timbra ---- */
    .step-timbra {
      width: 100%;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .step-timbra.active {
      display: flex;
    }

    .selected-name {
      font-size: 28px;
      font-weight: 700;
      color: #1a73e8;
      text-align: center;
    }

    .btn-back {
      font-size: 13px;
      color: #999;
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
      padding: 4px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .pin-section label {
      display: block;
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .pin-input {
      width: 100%;
      font-size: 32px;
      text-align: center;
      letter-spacing: 12px;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      outline: none;
      transition: border-color 0.2s;
      -webkit-text-security: disc;
    }

    .pin-input:focus {
      border-color: #1a73e8;
    }

    .pin-input.error {
      border-color: #d93025;
      animation: shake 0.4s ease-in-out;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    .btn-timbra {
      width: 100%;
      padding: 18px;
      font-size: 22px;
      font-weight: 700;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s;
      color: white;
      letter-spacing: 1px;
    }

    .btn-timbra:active { transform: scale(0.97); }
    .btn-timbra:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-entrata { background: linear-gradient(135deg, #34a853, #1e8e3e); }
    .btn-uscita { background: linear-gradient(135deg, #ea4335, #c5221f); }
    .btn-loading { background: #9e9e9e; }

    .status-box {
      text-align: center;
      padding: 16px;
      border-radius: 12px;
      font-size: 15px;
      line-height: 1.5;
      width: 100%;
    }

    .status-success { background: #e6f4ea; color: #1e8e3e; }
    .status-error { background: #fce8e6; color: #d93025; }
    .status-info { background: #e8f0fe; color: #1a73e8; }

    .status-box .big { font-size: 42px; display: block; margin-bottom: 8px; }
    .status-box .ora { font-size: 24px; font-weight: 700; display: block; }

    .gps-status {
      font-size: 13px;
      color: #999;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .gps-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    .gps-dot.ok { background: #34a853; }
    .gps-dot.loading { background: #fbbc04; animation: pulse 1s infinite; }
    .gps-dot.error { background: #ea4335; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .footer {
      text-align: center;
      font-size: 11px;
      color: #ccc;
      padding: 20px 0;
    }

    .loading-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.3s;
    }

    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e0e0e0;
      border-top-color: #1a73e8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- Overlay caricamento -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <p style="color:#666;">Caricamento...</p>
  </div>

  <div class="container">
    <div class="header">
      <div class="bar-name">La Tienda de Juan</div>
      <h1>Timbratura</h1>
    </div>

    <!-- Stato GPS -->
    <div class="gps-status" id="gpsStatus">
      <span class="gps-dot loading" id="gpsDot"></span>
      <span id="gpsText">Localizzazione in corso...</span>
    </div>

    <!-- STEP 1: Scegli chi sei -->
    <div class="employee-list" id="stepScegli">
      <p>Chi sei?</p>
      <!-- Bottoni generati dal JS -->
    </div>

    <!-- STEP 2: PIN + Timbra -->
    <div class="step-timbra" id="stepTimbra">
      <div class="selected-name" id="nomeSelezionato"></div>
      <button class="btn-back" onclick="tornaAllaLista()">Cambia dipendente</button>

      <div class="card pin-section">
        <label for="pinInput">Inserisci il tuo PIN</label>
        <input type="tel" id="pinInput" class="pin-input"
               maxlength="4" pattern="[0-9]*" inputmode="numeric"
               autocomplete="off" placeholder="••••">
      </div>

      <button class="btn-timbra btn-loading" id="btnTimbra" disabled onclick="timbra()">
        Caricamento...
      </button>

      <div class="status-box status-info" id="statusBox" style="display:none;"></div>
    </div>

    <div class="footer">
      La Tienda de Juan &mdash; Rilevazione presenze
    </div>
  </div>

  <script>
    // Dati iniettati dal server
    var DIPENDENTI = <?= dipendentiJSON ?>;
    var BAR_LAT = <?= barLat ?>;
    var BAR_LNG = <?= barLng ?>;
    var MAX_DISTANZA = <?= maxDistanza ?>;

    // Stato
    var gpsReady = false;
    var currentLat = null;
    var currentLng = null;
    var selectedId = null;
    var prossimaAzione = null;
    var isProcessing = false;

    // ---- Inizializzazione ----
    init();

    function init() {
      // Genera i bottoni dipendenti
      var container = document.getElementById('stepScegli');
      for (var id in DIPENDENTI) {
        var btn = document.createElement('button');
        btn.className = 'btn-employee';
        btn.textContent = DIPENDENTI[id];
        btn.setAttribute('data-id', id);
        btn.onclick = function() { selezionaDipendente(this.getAttribute('data-id')); };
        container.appendChild(btn);
      }

      // Avvia geolocalizzazione
      if ('geolocation' in navigator) {
        navigator.geolocation.getCurrentPosition(
          onGpsSuccess,
          onGpsError,
          { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
        );
      } else {
        showGpsStatus('error', 'GPS non disponibile su questo dispositivo');
      }

      // Nascondi overlay
      document.getElementById('loadingOverlay').classList.add('hidden');

      // Enter sul PIN
      document.getElementById('pinInput').addEventListener('keyup', function(e) {
        if (e.key === 'Enter' && this.value.length === 4) {
          timbra();
        }
      });
    }

    // ---- Selezione dipendente ----
    function selezionaDipendente(id) {
      selectedId = id;
      prossimaAzione = null;

      document.getElementById('nomeSelezionato').textContent = DIPENDENTI[id];
      document.getElementById('stepScegli').style.display = 'none';
      document.getElementById('stepTimbra').classList.add('active');
      document.getElementById('pinInput').value = '';
      document.getElementById('statusBox').style.display = 'none';

      // Carica la prossima azione
      var btn = document.getElementById('btnTimbra');
      btn.textContent = 'Caricamento...';
      btn.className = 'btn-timbra btn-loading';
      btn.disabled = true;

      google.script.run
        .withSuccessHandler(function(azione) {
          prossimaAzione = azione;
          btn.textContent = 'TIMBRA ' + azione;
          btn.className = 'btn-timbra ' + (azione === 'ENTRATA' ? 'btn-entrata' : 'btn-uscita');
          btn.disabled = false;
        })
        .withFailureHandler(function() {
          prossimaAzione = 'ENTRATA';
          btn.textContent = 'TIMBRA ENTRATA';
          btn.className = 'btn-timbra btn-entrata';
          btn.disabled = false;
        })
        .getProssimaAzione(id);

      setTimeout(function() {
        document.getElementById('pinInput').focus();
      }, 300);
    }

    function tornaAllaLista() {
      selectedId = null;
      prossimaAzione = null;
      document.getElementById('stepScegli').style.display = 'flex';
      document.getElementById('stepTimbra').classList.remove('active');
    }

    // ---- GPS ----
    function onGpsSuccess(position) {
      currentLat = position.coords.latitude;
      currentLng = position.coords.longitude;
      gpsReady = true;

      var distanza = calcolaDistanza(BAR_LAT, BAR_LNG, currentLat, currentLng);

      if (distanza <= MAX_DISTANZA) {
        showGpsStatus('ok', 'Posizione verificata (' + Math.round(distanza) + 'm)');
      } else {
        showGpsStatus('error', 'Troppo lontano (' + Math.round(distanza) + 'm)');
      }
    }

    function onGpsError(error) {
      var msg = 'Errore GPS: ';
      switch(error.code) {
        case 1: msg += 'Permesso negato. Abilita la localizzazione.'; break;
        case 2: msg += 'Posizione non disponibile.'; break;
        case 3: msg += 'Timeout. Riprova.'; break;
        default: msg += error.message;
      }
      showGpsStatus('error', msg);
    }

    function showGpsStatus(status, text) {
      document.getElementById('gpsDot').className = 'gps-dot ' + status;
      document.getElementById('gpsText').textContent = text;
    }

    // ---- Timbratura ----
    function timbra() {
      if (isProcessing || !selectedId) return;

      var pin = document.getElementById('pinInput').value;

      if (pin.length !== 4) {
        document.getElementById('pinInput').classList.add('error');
        setTimeout(function() {
          document.getElementById('pinInput').classList.remove('error');
        }, 400);
        return;
      }

      if (!gpsReady) {
        showStatusBox('error',
          '<span class="big">📍</span>' +
          'In attesa della posizione GPS...<br>Abilita la localizzazione nelle impostazioni.');
        return;
      }

      isProcessing = true;
      var btn = document.getElementById('btnTimbra');
      btn.disabled = true;
      btn.textContent = 'Registrazione...';
      btn.className = 'btn-timbra btn-loading';

      google.script.run
        .withSuccessHandler(onTimbraturaSuccess)
        .withFailureHandler(onTimbraturaError)
        .registraTimbratura({
          employeeId: selectedId,
          pin: pin,
          lat: currentLat,
          lng: currentLng,
          userAgent: navigator.userAgent.substring(0, 150)
        });
    }

    function onTimbraturaSuccess(result) {
      isProcessing = false;

      if (result.success) {
        var icon = result.tipo === 'ENTRATA' ? '✅' : '🔴';
        showStatusBox('success',
          '<span class="big">' + icon + '</span>' +
          '<b>' + result.tipo + ' registrata</b><br>' +
          '<span class="ora">' + result.ora + '</span><br>' +
          'Distanza: ' + result.distanza + 'm');

        prossimaAzione = result.tipo === 'ENTRATA' ? 'USCITA' : 'ENTRATA';
        var btn = document.getElementById('btnTimbra');
        btn.textContent = 'TIMBRA ' + prossimaAzione;
        btn.className = 'btn-timbra ' + (prossimaAzione === 'ENTRATA' ? 'btn-entrata' : 'btn-uscita');
        btn.disabled = false;

        document.getElementById('pinInput').value = '';
      } else {
        showStatusBox('error', '<span class="big">⚠️</span>' + result.errore);

        if (result.errore.indexOf('PIN') !== -1) {
          var pinEl = document.getElementById('pinInput');
          pinEl.classList.add('error');
          pinEl.value = '';
          pinEl.focus();
          setTimeout(function() { pinEl.classList.remove('error'); }, 400);
        }

        resetButton();
      }
    }

    function onTimbraturaError() {
      isProcessing = false;
      showStatusBox('error', '<span class="big">❌</span>Errore di comunicazione. Riprova.');
      resetButton();
    }

    function resetButton() {
      var btn = document.getElementById('btnTimbra');
      btn.textContent = 'TIMBRA ' + prossimaAzione;
      btn.className = 'btn-timbra ' + (prossimaAzione === 'ENTRATA' ? 'btn-entrata' : 'btn-uscita');
      btn.disabled = false;
    }

    // ---- Utilità ----
    function showStatusBox(type, html) {
      var box = document.getElementById('statusBox');
      box.className = 'status-box status-' + type;
      box.innerHTML = html;
      box.style.display = 'block';
    }

    function calcolaDistanza(lat1, lon1, lat2, lon2) {
      var R = 6371000;
      var dLat = (lat2 - lat1) * Math.PI / 180;
      var dLon = (lon2 - lon1) * Math.PI / 180;
      var a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLon/2) * Math.sin(dLon/2);
      var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }
  </script>

</body>
</html>
