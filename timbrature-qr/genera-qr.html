<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genera QR Code - La Tienda de Juan</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    .container {
      max-width: 600px;
      width: 100%;
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 8px;
      font-size: 22px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .card label {
      display: block;
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .card input {
      width: 100%;
      padding: 12px;
      font-size: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
    }

    .card input:focus {
      border-color: #1a73e8;
    }

    .hint {
      font-size: 12px;
      color: #999;
      margin-top: 6px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      font-size: 18px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      color: white;
      background: #1a73e8;
    }

    .btn:active { transform: scale(0.97); }

    .btn-print {
      background: #34a853;
      margin-top: 16px;
    }

    /* QR Code risultato */
    .qr-result {
      display: none;
      text-align: center;
      margin-top: 20px;
    }

    .qr-card {
      background: white;
      border: 2px solid #e0e0e0;
      border-radius: 16px;
      padding: 32px;
      text-align: center;
    }

    .qr-card h2 {
      font-size: 22px;
      color: #333;
      margin-bottom: 4px;
    }

    .qr-card .qr-sub {
      font-size: 14px;
      color: #666;
      margin-bottom: 20px;
    }

    .qr-card canvas {
      margin: 0 auto;
      display: block;
    }

    .qr-card .istruzioni-dip {
      margin-top: 20px;
      font-size: 14px;
      color: #333;
      line-height: 1.8;
      text-align: left;
      background: #f9f9f9;
      padding: 16px;
      border-radius: 8px;
    }

    .qr-card .istruzioni-dip b {
      color: #1a73e8;
    }

    .qr-url {
      margin-top: 12px;
      font-size: 11px;
      color: #ccc;
      word-break: break-all;
    }

    @media print {
      body { background: white; padding: 0; }
      .no-print { display: none !important; }
      .qr-result { display: block !important; }
      .qr-card { border: 1px solid #ccc; }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>La Tienda de Juan</h1>
    <p class="subtitle">Genera il QR code per le timbrature</p>

    <div class="card no-print">
      <label for="urlInput">URL della Web App di Google Apps Script</label>
      <input type="url" id="urlInput"
             placeholder="https://script.google.com/macros/s/.../exec">
      <div class="hint">
        Lo trovi in: Google Sheet → Estensioni → Apps Script → Deploy → Gestisci distribuzioni
      </div>
    </div>

    <button class="btn no-print" onclick="generaQR()">Genera QR Code</button>

    <!-- Risultato -->
    <div class="qr-result" id="qrResult">
      <div class="qr-card">
        <h2>La Tienda de Juan</h2>
        <p class="qr-sub">Timbra la tua presenza</p>
        <canvas id="qrCanvas"></canvas>
        <div class="istruzioni-dip">
          <b>1.</b> Scansiona il QR code col telefono<br>
          <b>2.</b> Seleziona il tuo nome<br>
          <b>3.</b> Inserisci il tuo PIN<br>
          <b>4.</b> Premi TIMBRA
        </div>
        <div class="qr-url" id="qrUrl"></div>
      </div>

      <button class="btn btn-print no-print" onclick="window.print()">Stampa</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

  <script>
    function generaQR() {
      var url = document.getElementById('urlInput').value.trim();

      if (!url) {
        alert('Inserisci l\'URL della Web App!');
        return;
      }

      if (url.endsWith('/')) url = url.slice(0, -1);

      document.getElementById('qrUrl').textContent = url;

      QRCode.toCanvas(document.getElementById('qrCanvas'), url, {
        width: 250,
        margin: 2,
        color: { dark: '#000000', light: '#ffffff' }
      });

      document.getElementById('qrResult').style.display = 'block';
      document.getElementById('qrResult').scrollIntoView({ behavior: 'smooth' });
    }
  </script>

</body>
</html>
